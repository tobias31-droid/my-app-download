<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旅遊停車推薦 APP 下載</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #eaf4ff, #fff7ec, #f4ecff);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      color: #1f2a44;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 28px;
      padding: 30px 24px;
      box-shadow: 0 18px 45px rgba(31, 42, 68, 0.16);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.75);
    }

    .icon {
      width: 82px;
      height: 82px;
      border-radius: 24px;
      margin: 0 auto 18px;
      background: linear-gradient(135deg, #4f8fd8, #8cc9a3);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 42px;
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(79, 143, 216, 0.35);
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.3;
      font-weight: 900;
    }

    .subtitle {
      margin: 12px 0 20px;
      color: #5f6b7a;
      line-height: 1.7;
      font-size: 15px;
      font-weight: 600;
    }

    .info {
      background: #f5f8fc;
      border-radius: 18px;
      padding: 14px;
      margin: 18px 0;
      text-align: left;
      font-size: 14px;
      line-height: 1.8;
      color: #344054;
    }

    .download-btn {
      display: block;
      width: 100%;
      text-decoration: none;
      background: linear-gradient(135deg, #2f6fb3, #5fa8e8);
      color: white;
      padding: 16px 20px;
      border-radius: 999px;
      font-size: 17px;
      font-weight: 900;
      box-shadow: 0 10px 22px rgba(47, 111, 179, 0.3);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .download-btn:active {
      transform: scale(0.97);
      box-shadow: 0 6px 15px rgba(47, 111, 179, 0.25);
    }

    .note {
      margin-top: 16px;
      color: #6e6e73;
      font-size: 13px;
      line-height: 1.6;
    }

    .version {
      display: inline-block;
      margin-top: 8px;
      padding: 5px 12px;
      border-radius: 999px;
      background: #eaf4ff;
      color: #2f6fb3;
      font-size: 13px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">P</div>

    <h1>旅遊停車推薦 APP</h1>

    <div class="version">Version 1.0.1</div>

    <p class="subtitle">
      以景點為中心，查詢附近停車場，提供距離、剩餘車位、收費資訊、推薦分數與 Google 導航。
    </p>

    <div class="info">
      <strong>支援功能：</strong><br>
      ・台灣縣市選擇<br>
      ・景點與停車場搜尋<br>

      ・語音搜尋與導航<br>
      ・汽車 / 機車停車資訊
    </div>

    <a class="download-btn" href="smart_parking_app_v1.0.0.apk" download>
      下載 Android APK
    </a>

    <p class="note">
      下載後請點開 APK 安裝。<br>
      若手機跳出未知來源提醒，請允許 Chrome 或檔案管理器安裝未知應用程式。
    </p>
  </main>

</html>
